# Runs only on main. Integrate work on `dev` (PRs → dev); merge dev → main when you want
# Release Please to see new commits and refresh the release PR.
#
# Release Please opens/updates a release PR on main; when you merge it, this workflow
# creates a GitHub Release and publishes to npm. npm publish runs in this same workflow
# (not via release events) so it still runs when using the default GITHUB_TOKEN.
#
# npm: configure Trusted Publishing for package @thenvoi/n8n-nodes-thenvoi with workflow file
# release.yml (see README). Optional: set NPM_TOKEN secret for token-based publish fallback.
#
# --provenance: n8n verification expects published packages to include provenance when
# publishing from GitHub Actions; explicit flag also covers token-based publish (OIDC may
# attach provenance without it, but this keeps behavior clear). Requires a public GitHub repo.

name: Release

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance
